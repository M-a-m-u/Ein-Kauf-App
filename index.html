<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Einkaufs-Planer Pro v2.5</title>
    <style>
        :root {
            --bg: #f2f2f7; --card: #ffffff; --blue: #007aff; --red: #ff3b30; --gray: #8e8e93; --green: #34c759;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg); margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px;
            color: #000; -webkit-tap-highlight-color: transparent;
        }
        .screen { display: none; }
        .active { display: block; }

        /* Header & Zentrierung */
        .app-header { text-align: center; margin: 20px 0; }
        .main-emoji { font-size: 60px; display: block; margin-bottom: 10px; }
        h1 { margin: 0; font-weight: 800; font-size: 28px; }

        .header-row { 
            display: flex; align-items: center; padding: 10px 0; position: sticky; 
            top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid #d1d1d6; margin-bottom: 20px;
        }
        .back-btn { font-size: 32px; color: var(--blue); margin-right: 15px; font-weight: bold; cursor: pointer; }

        /* Grid Home */
        .discounter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .shop-btn {
            background: var(--card); border-radius: 20px; height: 140px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e5e5e5;
            transition: transform 0.1s;
        }
        .shop-btn:active { transform: scale(0.95); }
        .shop-btn img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }

        /* Listen & Cards */
        .list-card {
            background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .info-area { flex: 1; }
        .info-hersteller { font-size: 11px; color: var(--gray); text-transform: uppercase; }
        .info-name { font-size: 17px; font-weight: 700; line-height: 1.2; }
        
        /* Inputs & Suchfeld */
        .qty-input { width: 55px; padding: 10px; border-radius: 10px; border: 2px solid var(--blue); text-align: center; font-size: 18px; font-weight: bold; background: #fff; }
        input[type="text"], input[type="number"], .search-box { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 16px; box-sizing: border-box;
        }

        .btn-action { width: 100%; background: #3a3a3c; color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 600; margin-top: 10px; }
        .btn-blue { background: var(--blue); }
        .btn-clear { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 10px; margin-left: auto; font-weight: 600; }
    </style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
    <div class="app-header">
        <span class="main-emoji">🛒</span>
        <h1>Einkaufsapp</h1>
    </div>

    <div class="discounter-grid">
        <div class="shop-btn" onclick="vibrate(); goShop('Aldi')"><img src="aldi.png">Aldi</div>
        <div class="shop-btn" onclick="vibrate(); goShop('Edeka')"><img src="edeka.png">Edeka</div>
        <div class="shop-btn" onclick="vibrate(); goShop('Penny')"><img src="penny.png">Penny</div>
        <div class="shop-btn" onclick="vibrate(); goShop('Rewe')"><img src="rewe.png">Rewe</div>
    </div>
    <button class="btn-action" onclick="vibrate(); goScreen('db')">⚙️ Datenbank / Produkte</button>
    <button class="btn-action" style="background:#8e8e93" onclick="exportJSON()">📥 Datenbank Sichern (JSON)</button>
    <button class="btn-action" style="background:#8e8e93" onclick="document.getElementById('importFile').click()">📤 Datenbank Laden (JSON)</button>
    <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
</div>

<!-- LIST SCREEN (Einkaufswagen mit SUCHE) -->
<div id="list" class="screen">
    <div class="header-row">
        <div class="back-btn" onclick="vibrate(); goScreen('home')">‹</div>
        <h2 id="current-shop-title" style="margin:0;">Laden</h2>
        <button class="btn-clear" onclick="vibrate(); clearCurrentList()">Leeren</button>
    </div>

    <!-- Die neue Such-Zentrale -->
    <div style="background:#e9e9eb; padding:15px; border-radius:15px; margin-bottom:20px;">
        <label style="font-weight:bold; font-size:14px; display:block; margin-bottom:8px;">Produkt suchen & hinzufügen:</label>
        <input type="text" id="db-search" list="db-options" class="search-box" placeholder="Tippe einen Buchstaben..." oninput="checkSelection(this.value)" style="margin-bottom:0;">
        <datalist id="db-options">
            <!-- Wird per JS gefüllt -->
        </datalist>
    </div>

    <div id="shopping-list-content"></div>
</div>

<!-- DATABASE SCREEN -->
<div id="db" class="screen">
    <div class="header-row">
        <div class="back-btn" onclick="vibrate(); goScreen('home')">‹</div>
        <h2 style="margin:0;">Stammdaten</h2>
    </div>
    <input type="text" id="dbH" placeholder="Hersteller (z.B. Hellmann's)">
    <input type="text" id="dbP" placeholder="Produktname (z.B. Mayonnaise)">
    <input type="text" id="dbG" placeholder="Gewicht/Einheit (z.B. 250ml)">
    <button class="btn-action btn-blue" onclick="vibrate(); saveToMaster()">In Datenbank speichern</button>
    
    <h3 style="margin-top:30px; border-bottom:1px solid #ccc; padding-bottom:10px;">Sortierte Bestandsliste</h3>
    <div id="db-view"></div>
</div>

<script>
    let masterData = JSON.parse(localStorage.getItem('shop_master')) || [];
    let cart = JSON.parse(localStorage.getItem('shop_cart')) || {};

    // Kurzes haptisches Feedback für das iPhone
    function vibrate() {
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'db') renderDBView();
        if(id === 'list') { renderShopList(); updateDropdown(); }
        window.scrollTo(0,0);
    }

    function sortMasterData() {
        masterData.sort((a, b) => a.p.localeCompare(b.p));
    }

    // --- Backup Funktionen ---
    function exportJSON() {
        const dataStr = JSON.stringify({master: masterData, cart: cart});
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "einkaufsapp_backup.json";
        a.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                masterData = imported.master || [];
                cart = imported.cart || {};
                sortMasterData();
                saveAll();
                alert("Daten erfolgreich geladen!");
                location.reload();
            } catch(err) { alert("Fehler beim Laden."); }
        };
        reader.readAsText(file);
    }

    // --- Datenbank Management ---
    function saveToMaster() {
        const p = document.getElementById('dbP').value;
        if(!p) return alert("Name fehlt!");
        
        masterData.push({ 
            id: Date.now(), 
            h: document.getElementById('dbH').value || "Kein Hersteller", 
            p: p, 
            g: document.getElementById('dbG').value || "-" 
        });
        
        sortMasterData();
        saveAll();
        
        document.getElementById('dbH').value = "";
        document.getElementById('dbP').value = "";
        document.getElementById('dbG').value = "";
        renderDBView();
    }

    function renderDBView() {
        sortMasterData();
        document.getElementById('db-view').innerHTML = masterData.map((item, idx) => `
            <div class="list-card">
                <div class="info-area">
                    <div class="info-hersteller">${item.h}</div>
                    <div class="info-name">${item.p}</div>
                    <div class="info-gewicht">${item.g}</div>
                </div>
                <button onclick="deleteMaster(${idx})" style="color:var(--red); border:none; background:none; font-weight:bold;">Löschen</button>
            </div>
        `).join('');
    }

    function deleteMaster(idx) {
        if(confirm("Produkt wirklich löschen?")) { 
            masterData.splice(idx, 1); 
            saveAll(); 
            renderDBView(); 
        }
    }

    // --- Shop & Such-Logik ---
    let currentShop = "";
    function goShop(shop) {
        currentShop = shop;
        document.getElementById('current-shop-title').innerText = shop;
        if(!cart[currentShop]) cart[currentShop] = [];
        goScreen('list');
    }

    // Füllt die Vorschlagsliste für das Suchfeld
    function updateDropdown() {
        const datalist = document.getElementById('db-options');
        sortMasterData();
        datalist.innerHTML = masterData.map(item => `<option value="${item.p} (${item.h})">`).join('');
    }

    // Prüft bei jeder Eingabe, ob ein Treffer ausgewählt wurde
    function checkSelection(val) {
        const found = masterData.find(m => `${m.p} (${m.h})` === val);
        
        if (found) {
            if (!cart[currentShop].find(c => c.id === found.id)) {
                cart[currentShop].push({...found, qty: 1});
                cart[currentShop].sort((a, b) => a.p.localeCompare(b.p));
                saveAll();
                renderShopList();
                vibrate();
            }
            // Eingabe leeren & Tastatur schließen für flüssigen Workflow
            document.getElementById('db-search').value = "";
            document.activeElement.blur(); 
        }
    }

    function updateQty(id, val) {
        const item = cart[currentShop].find(c => c.id == id);
        if(item) {
            item.qty = val;
            if(val <= 0) {
                cart[currentShop] = cart[currentShop].filter(c => c.id != id);
            }
            saveAll();
            renderShopList();
        }
    }

    function renderShopList() {
        const container = document.getElementById('shopping-list-content');
        container.innerHTML = cart[currentShop].map(item => `
            <div class="list-card">
                <div class="info-area">
                    <div class="info-hersteller">${item.h}</div>
                    <div class="info-name">${item.p}</div>
                    <div class="info-gewicht">${item.g}</div>
                </div>
                <input type="number" class="qty-input" value="${item.qty}" onchange="updateQty(${item.id}, this.value)">
            </div>
        `).join('');
    }

    function clearCurrentList() {
        if(confirm("Liste für " + currentShop + " leeren?")) {
            cart[currentShop] = [];
            saveAll();
            renderShopList();
        }
    }

    function saveAll() {
        localStorage.setItem('shop_master', JSON.stringify(masterData));
        localStorage.setItem('shop_cart', JSON.stringify(cart));
    }
</script>
</body>
</html>
